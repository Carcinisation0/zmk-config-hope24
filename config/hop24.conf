# Wymuszenie 1000Hz polling rate przez USB (1ms)
CONFIG_USB_HID_POLL_INTERVAL_MS=1

# Przyspieszenie skanowania matrycy klawiszy
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# Wyłączenie usypiania (brak lagów przy "pobudce")
CONFIG_ZMK_SLEEP=n

# Wyłączenie logowania USB (logi spowalniają procesor)
CONFIG_ZMK_USB_LOGGING=n
